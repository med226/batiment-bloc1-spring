name: Selenium CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Lancer les tests Selenium
        env:
          CI: true
        run: |
          cd api/selenium-tests
          mvn -e -DtrimStackTrace=false test

      - name: Publier les rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: api/selenium-tests/target/surefire-reports
