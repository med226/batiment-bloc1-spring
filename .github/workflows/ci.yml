name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: supersecuredrootpassword
          MARIADB_DATABASE: batimentdb
        ports:
          - 9806:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -psupersecuredrootpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          for i in {1..40}; do
            if mariadb-admin ping -h 127.0.0.1 -P 9806 -uroot -psupersecuredrootpassword --silent; then
              echo "MariaDB is ready"
              exit 0
            fi
            echo "Waiting for MariaDB..."
            sleep 5
          done
          echo "MariaDB failed to start"
          exit 1

      - name: Build Spring Boot
        run: |
          cd api
          mvn clean package -DskipTests

      - name: Start Spring Boot
        run: |
          cd api
          nohup mvn spring-boot:run > spring.log 2>&1 &

      - name: Wait for Spring Boot
        run: |
          for i in {1..40}; do
            if curl -f http://localhost:8081/actuator/health; then
              echo "Spring Boot is ready"
              exit 0
            fi
            echo "Waiting for Spring Boot on port 8081..."
            sleep 5
          done
          echo "Spring Boot failed to start"
          echo "===== spring.log ====="
          cat api/spring.log || true
          exit 1

      - name: Run Selenium Tests
        run: |
          cd api/selenium-tests
          mvn test

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: api/selenium-tests/target/surefire-reports

      - name: Upload Spring log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-log
          path: api/spring.log
