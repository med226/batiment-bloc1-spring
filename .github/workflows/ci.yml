name: Selenium Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Check Chrome on runner
        run: |
          which google-chrome || true
          /usr/bin/google-chrome --version || true

      - name: Run Selenium tests
        env:
          CI: true
        run: |
          cd api/selenium-tests
          mvn -e -DtrimStackTrace=false test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: api/selenium-tests/target/surefire-reports
