name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Spring Boot
        run: |
          cd api
          mvn clean package -DskipTests

      - name: Start Spring Boot
        run: |
          cd api
          nohup mvn spring-boot:run > spring.log 2>&1 &

      - name: Wait for Spring Boot
        run: |
          for i in {1..30}; do
            curl -I http://localhost:8080/contact && exit 0
            echo "Waiting for Spring Boot..."
            sleep 5
          done
          echo "Spring Boot failed to start"
          cat api/spring.log || true
          exit 1

      - name: Run Selenium Tests
        run: |
          cd api/selenium-tests
          mvn test

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: api/selenium-tests/target/surefire-reports

      - name: Upload Spring log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-log
          path: api/spring.log
