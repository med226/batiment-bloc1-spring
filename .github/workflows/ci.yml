name: Selenium CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Lancer les tests Selenium
        run: |
          cd api/selenium-tests
          mvn test
