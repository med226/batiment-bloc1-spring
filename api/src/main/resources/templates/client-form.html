<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Ajouter client</title>
  </head>

  <body>
    <h1>Nouveau client</h1>

    <form
      th:action="@{/admin/clients/save}"
      th:object="${client}"
      method="post"
    >
      <input type="text" th:field="*{nom}" placeholder="Nom" />
      <br /><br />

      <input type="text" th:field="*{prenom}" placeholder="Prénom" />
      <br /><br />

      <input type="text" th:field="*{telephone}" placeholder="Téléphone" />
      <br /><br />

      <input type="email" th:field="*{email}" placeholder="Email" />
      <br /><br />

      <input type="text" th:field="*{adresse}" placeholder="Adresse" />
      <br /><br />

      <button type="submit">Enregistrer</button>
    </form>
  </body>
</html>
